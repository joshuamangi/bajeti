name: Deploy on Raspberry Pi

on:
  pull_request:
    branches: [ main ]
    types: [closed]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /home/joshuamangi/projects/bajeti
          git fetch origin main
          git reset --hard origin/main

      - name: Load environment variables
        run: |
          cd /home/joshuamangi/projects/bajeti
          echo "Writing .env file..."
          cat <<EOF > .env
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          API_SERVER=${{ secrets.API_SERVER }}
          ENVIRONMENT=${{ secrets.ENVIRONMENT }}
          EOF

      - name: Build and deploy containers FIRST
        run: |
          cd /home/joshuamangi/projects/bajeti
          docker compose down bajeti_app || true
          docker compose build --no-cache bajeti_app
          docker compose up -d bajeti_app

      - name: Wait for container to be ready
        run: sleep 10

      - name: Run Alembic migrations on the NEW container
        run: |
          cd /home/joshuamangi/projects/bajeti
          echo "Current migration before upgrade:"
          docker compose exec bajeti_app alembic current
          echo "Running migrations to head..."
          docker compose exec bajeti_app alembic upgrade head
          echo "Migration completed. Current revision:"
          docker compose exec bajeti_app alembic current

      - name: Clean up
        run: docker image prune -f

      - name: Verify deployment
        run: |
          cd /home/joshuamangi/projects/bajeti
          sleep 5
          docker compose ps
          docker compose logs bajeti_app --tail=20